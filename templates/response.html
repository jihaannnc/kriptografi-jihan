<html>
<head>
   <title>Hasil Enkripsi Kriptografi</title>
   <style>
      body { 
         font-family: 'Comic Sans MS', 'Segoe UI', sans-serif; 
         margin: 0;
         padding: 20px;
         display: flex;
         justify-content: center;
         align-items: center;
         min-height: 100vh;
         /* Gradasi background pastel ceria berlawanan arah agar dinamis */
         background: linear-gradient(135deg, #e2dcff 0%, #ffcfe2 50%, #d6ecff 100%);
         position: relative;
         overflow: hidden;
      }

      /* Dekorasi tambahan bintang jatuh lembut */
      body::before { content: "✨"; position: absolute; top: 15%; right: 15%; color: #fff; font-size: 2.2em; opacity: 0.8; animation: spin 5s linear infinite; }
      body::after { content: "🌟"; position: absolute; bottom: 10%; left: 12%; color: #fff; font-size: 1.8em; opacity: 0.7; }

      @keyframes spin { 100% { transform: rotate(360deg); } }

      .candy-card { 
         max-width: 450px; 
         width: 100%;
         background: rgba(255, 255, 255, 0.92); 
         padding: 35px; 
         border-radius: 25px; 
         box-shadow: 0 12px 30px rgba(138, 124, 219, 0.2); 
         border: 4px solid #fff; 
         text-align: center;
         box-sizing: border-box;
      }

      h2 { 
         color: #ff76a0; 
         margin-top: 0; 
         font-size: 2em;
         font-weight: bold;
      }

      .sub-title {
         color: #a4b3c6;
         font-size: 0.95em;
         margin-bottom: 25px;
      }

      .info-box { 
         background-color: #f6f9fe;
         padding: 15px;
         border-radius: 20px;
         margin-bottom: 15px;
         border: 2px dashed #d2e6ff;
      }

      .encrypt-box {
         background-color: #fff0f5;
         padding: 15px;
         border-radius: 20px;
         margin-bottom: 20px;
         border: 2px dashed #ffc0d3;
      }

      label { 
         font-weight: bold; 
         color: #8a7cdb; 
         display: block; 
         font-size: 0.85em; 
         text-transform: uppercase;
         letter-spacing: 0.5px;
         margin-bottom: 6px; 
      }

      .value { 
         font-size: 1.25em; 
         color: #4a5568; 
         font-weight: bold; 
      }

      .highlight { 
         color: #e8437a; 
         font-family: 'Courier New', Courier, monospace; 
         font-weight: bold; 
         font-size: 1.5em; 
         word-wrap: break-word;
         display: block;
         background: #fff;
         padding: 6px;
         border-radius: 10px;
         margin-top: 5px;
         border: 1px solid #ffe1eb;
      }

      .badge { 
         background: linear-gradient(45deg, #a8c7ff, #c3a6ff); 
         color: white; 
         padding: 5px 12px; 
         border-radius: 20px; 
         font-size: 0.8em; 
         font-weight: bold; 
         display: inline-block;
         margin-top: 5px;
      }

      /* Tombol kembali pastel ungu-pink */
      .btn-back {
         display: block;
         background: linear-gradient(45deg, #9cbfff, #b99eff);
         color: white;
         text-sizing: border-box;
         text-decoration: none;
         padding: 14px;
         border-radius: 15px;
         font-weight: bold;
         font-size: 1em;
         transition: all 0.3s;
         border: none;
         cursor: pointer;
         width: 100%;
         font-family: 'Comic Sans MS', sans-serif;
         box-shadow: 0 4px 12px rgba(156, 191, 255, 0.3);
      }

      .btn-back:hover {
         transform: scale(1.02);
         box-shadow: 0 6px 18px rgba(156, 191, 255, 0.5);
      }
   </style>
</head>
<body>

   <div class="candy-card">
      <h2>🎉 Berhasil! 🌟</h2>
      <div class="sub-title">Nama anda telah berhasil dienkripsi</div>
      
      <div class="info-box">
         <label>👤 Nama Asli Anda</label>
         <div class="value" id="namaAsli">Memuat...</div>
      </div>

      <div class="encrypt-box">
         <label>🔒 Hasil Enkripsi (Ciphertext)</label>
         <div class="value"><span class="highlight">{{ nama }}</span></div>
      </div>

      <div style="font-size: 0.85em; color: #9aa8bd; margin-bottom: 20px;">
         Pemrograman Kriptografi oleh Jihan <br>
         <span class="badge">⚙️ Caesar Cipher (Shift 3)</span>
      </div>

      <button class="btn-back" onclick="window.history.back()">← KEMBALI</button>
   </div>

   <script>
      let ciphertext = `{{ nama }}`;
      let plaintext = "";
      let k = 3; 

      // Proses memunculkan kembali nama asli secara otomatis di sisi browser
      for (let i = 0; i < ciphertext.length; i++) {
         let charCode = ciphertext.charCodeAt(i);
         plaintext += String.fromCharCode(charCode - k);
      }

      document.getElementById("namaAsli").innerText = plaintext.trim();
   </script>

</body>
</html>
