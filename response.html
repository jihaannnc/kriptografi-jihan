<html>
<head>
   <title>Hasil Enkripsi Kriptografi</title>
   <style>
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background-color: #f5f7fb; color: #333; }
      .card { max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e1e8ed; }
      h2 { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
      .info-group { margin-bottom: 15px; padding: 10px 0; border-bottom: 1px dashed #eee; }
      .info-group:last-child { border-bottom: none; }
      label { font-weight: bold; color: #7f8c8d; display: block; font-size: 0.9em; margin-bottom: 5px; }
      .value { font-size: 1.1em; color: #2c3e50; font-weight: 500; }
      .highlight { color: #e74c3c; font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 1.2em; background: #fdf2f2; padding: 2px 8px; border-radius: 4px; }
      .badge { background: #2ecc71; color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.85em; font-weight: bold; }
   </style>
</head>
<body>

   <div class="card">
      <h2>🎉 Selamat Datang!</h2>
      
      <div class="info-group">
         <label>👤 Nama Pengguna:</label>
         <div class="value" id="namaAsli">Memuat...</div>
      </div>

      <div class="info-group">
         <label>🔒 Pesan Terenkripsi (Ciphertext):</label>
         <div class="value"><span class="highlight">{{ nama }}</span></div>
      </div>

      <div class="info-group">
         <label>⚙️ Jenis Kriptografi yang Digunakan:</label>
         <div class="value">
            <span class="badge">Kriptografi Klasik</span> 
            <strong style="color: #3498db;">Caesar Cipher (Shift 3)</strong>
         </div>
      </div>
   </div>

   <script>
      // Mengambil teks terenkripsi dari Flask (misal: "Mlkdq#Ilwuld")
      let ciphertext = `{{ nama }}`;
      let plaintext = "";
      let k = 3; // Kunci pergeseran dari dosen

      // Proses mendekripsi balik di sisi browser untuk memunculkan nama asli kamu
      for (let i = 0; i < ciphertext.length; i++) {
         let charCode = ciphertext.charCodeAt(i);
         // Mengurangi nilai ASCII sebesar 3 (kebalikan dari kode dosen)
         plaintext += String.fromCharCode(charCode - k);
      }

      // Tampilkan nama asli ke halaman web
      document.getElementById("namaAsli").innerText = plaintext.trim();
   </script>

</body>
</html>
